<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaFlow AI - Automatisez. Gagnez du temps.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0D1117;
            --blue-primary: #2563EB;
            --blue-light: #005CF6;
            --text-light: #F8FAFC;
            --text-gray: #94A3B8;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
        }

        .logo {
            font-family: 'Poppins', sans-serif;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .logo span {
            color: var(--blue-primary);
        }

        nav a {
            color: var(--text-gray);
            text-decoration: none;
            margin: 0 15px;
            font-size: 14px;
            transition: color 0.3s;
        }
        nav a:hover {
            color: var(--text-light);
        }

        .btn-call {
            background-color: var(--blue-primary);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
        }

        .hero {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 40px;
            text-align: center;
        }

        h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 48px;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        h1 span {
            color: #8B5CF6; /* Couleur violette pour l'intelligence artificielle */
        }

        .hero p {
            color: var(--text-gray);
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto 40px auto;
        }

        .cta-container {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn-primary {
            background-color: var(--blue-primary);
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--text-gray);
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">NOVA<span>FLOW</span> <small style="font-size:10px; font-weight:400; color:var(--text-gray);">AI</small></div>
        <nav>
            <a href="#">Accueil</a>
            <a href="#">Services</a>
            <a href="#">Tarifs</a>
            <a href="#">À propos</a>
            <a href="#">Contact</a>
        </nav>
        <a href="#" class="btn-call">Réserver un appel</a>
    </header>

    <section class="hero">
        <h1>Gagnez 10h+ par semaine<br>grâce à <span>l'intelligence artificielle</span></h1>
        <p>Nous automatisons vos tâches répétitives pour que vous puissiez vous concentrer sur l'essentiel.</p>
        
        <div class="cta-container">
            <a href="#" class="btn-primary">Réserver un appel gratuit</a>
            <a href="#" class="btn-secondary">Découvrir nos solutions</a>
        </div>
    </section>

</body>
</html>
